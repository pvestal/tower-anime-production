# Redis Configuration for Tower Anime Production
# Optimized for anime production workload with ComfyUI integration

# Basic Configuration
bind 127.0.0.1
port 6379
timeout 300
tcp-keepalive 60

# Memory Management
# Set memory limit for anime production (adjust based on available RAM)
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence Configuration
# Enable both RDB and AOF for data safety during long generation tasks
save 900 1
save 300 10
save 60 10000

# AOF Configuration for better durability
appendonly yes
appendfilename "anime-production-appendonly.aof"
appendfsync everysec

# Performance Tuning
# Optimize for mixed workload of small commands and large data structures
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Network and Connection Tuning
tcp-backlog 511
databases 16

# Logging
loglevel notice
logfile /var/log/redis/anime-production.log
syslog-enabled yes
syslog-ident anime-production-redis

# Security
# Disable dangerous commands that could affect production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""

# Client Connection Limits
maxclients 10000

# Slow Log Configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency Monitoring
latency-monitor-threshold 100