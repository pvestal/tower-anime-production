# Idea Factory v2 — prompt variety templates + creative intelligence config
#
# Reloaded every tick. Edit live — no restart needed.

compositions:
  - "close-up portrait, detailed face, eye-level"
  - "full body, centered frame"
  - "three-quarter view, slight angle"
  - "side profile, looking into distance"
  - "over-the-shoulder, looking back at camera"
  - "dutch angle, dramatic tilt"
  - "low angle, looking up at character"
  - "high angle, looking down at character"
  - "medium shot, waist up"
  - "extreme close-up, eyes and expression"
  - "wide shot, character small in frame"
  - "upper body, arms visible"
  - "back view, head turned slightly"
  - "two-thirds framing, off-center"
  - "symmetrical centered pose, frontal"

lighting:
  - "golden hour, warm rim light"
  - "dramatic side lighting, deep shadows"
  - "soft diffused light, overcast"
  - "neon glow, cyberpunk lighting"
  - "backlit silhouette, halo effect"
  - "studio lighting, even and clean"
  - "moonlit, cool blue tones"
  - "candlelight, warm intimate glow"
  - "harsh midday sun, strong contrast"
  - "volumetric light rays, atmospheric"
  - "sunset, orange and pink sky"
  - "foggy, muted and ethereal"

moods:
  - "contemplative, thoughtful expression"
  - "action ready, dynamic energy"
  - "casual and relaxed, natural pose"
  - "joyful, genuine smile"
  - "melancholic, wistful gaze"
  - "determined, fierce expression"
  - "playful, mischievous grin"
  - "serene, peaceful calm"
  - "intense, focused stare"
  - "surprised, wide eyes"
