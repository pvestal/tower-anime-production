# LoRA Catalog — categorization, content tiers, and action presets
# Used by GET /api/loras/catalog to serve the frontend LoRA browser

content_tiers:
  universal:
    - camera
    - speed
    - motion
  wholesome:   # G, PG — Mira, Small Wonders, Scramble City, Mario
    - walk
    - run
    - idle
    - emotion
    - environment_sfw
  mature:      # R — CGS, Echo Chamber
    - fight
    - explosion
    - weapon
    - cyberpunk
    - chase
  explicit:    # XXX — TDD, Rosa, Fury
    - position
    - oral
    - group
    - finish
    - nude
  furry_explicit:  # XXX + nova_animal — Fury only
    - furry_enhancer
    - anthro_interaction

# Rating gates — which content_rating values unlock which tiers
rating_gates:
  G: [universal, wholesome]
  PG: [universal, wholesome]
  PG-13: [universal, wholesome, mature]
  R: [universal, wholesome, mature]
  XXX: [universal, wholesome, mature, explicit, furry_explicit]

# Checkpoint compatibility
checkpoint_compat:
  illustrious:
    - waiIllustriousSDXL_v160.safetensors
  nova_animal:
    - nova_animal_xl_v11.safetensors

# ---- LORA TYPE TAXONOMY ----
# Every video LoRA entry MUST have a lora_type field:
#   pose     — body position/action (cowgirl, doggy, missionary, etc.)
#   camera   — camera movement (orbit, push_in, tilt, etc.)
#   action   — non-sexual body motion (fight, explosion, dance, walk, etc.)
#   style    — visual style modifier (retro_90s, live2d, DR34ML4Y, etc.)
#   quality  — quality/anatomy enhancer (general_nsfw, penis_enhancer, etc.)
#   pov      — first-person perspective LoRAs
#   furry    — anthro/furry-specific LoRAs
#
# Enforcement rules (applied in builder.py):
#   - Max 1 pose LoRA per shot
#   - Max 1 camera LoRA per shot
#   - When character LoRA is present: pose/quality strength capped at 0.6
#   - Camera LoRA strength capped at 0.5 when combined with pose LoRA

